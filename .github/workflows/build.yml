# v1.18.11 - 2026-03-06 終極發布架構 (修正 Husky 衝突與權限)
name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-node-v20-${{ hashFiles('client/package-lock.json') }}

      - name: Install Dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        env:
          HUSKY: 0
        run: |
          cd client
          echo "Starting dependency installation..."
          npm ci --no-scripts
          if ($LASTEXITCODE -ne 0) {
            echo "npm ci failed, falling back to npm install..."
            npm install --no-scripts --legacy-peer-deps
          }

      - name: Build and Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_SKIP_SIGN: true
          HUSKY: 0
        run: |
          cd client
          
          # 取得版本號
          $VERSION = node -p "require('./package.json').version"
          echo "Preparing Release for v$VERSION"
          
          # [步驟 1] 打裝安裝程式
          echo "Running Full Build..."
          npm run build:win
          
          # [步驟 2] 製作業務補丁 (Patch)
          echo "Generating Patch Zip..."
          if (Test-Path "src") {
              Compress-Archive -Path src -DestinationPath "patch-v${VERSION}.zip" -Force
          }
          
          # [步驟 3] 建立或檢查 Release
          echo "Checking/Creating GitHub Release..."
          gh release create v$VERSION --title "Release v$VERSION" --generate-notes --repo nephi4377/TAUpdata --latest 2>$null
          
          # [步驟 4] 強健上傳產出物
          echo "Scanning for assets in $(Get-Location)..."
          
          # 上傳 EXE
          $exeFiles = Get-ChildItem -Path "dist\*.exe" -ErrorAction SilentlyContinue
          foreach ($file in $exeFiles) {
              echo "Uploading Executable: $($file.FullName)"
              gh release upload v$VERSION "$($file.FullName)" --clobber --repo nephi4377/TAUpdata
          }
          
          # 上傳 latest.yml
          if (Test-Path "dist\latest.yml") {
              echo "Uploading latest.yml"
              gh release upload v$VERSION "dist\latest.yml" --clobber --repo nephi4377/TAUpdata
          }
          
          # 上傳 Patch Zip
          if (Test-Path "patch-v${VERSION}.zip") {
              echo "Uploading Patch: patch-v${VERSION}.zip"
              gh release upload v$VERSION "patch-v${VERSION}.zip" --clobber --repo nephi4377/TAUpdata
          }
          
          echo "Release v$VERSION infrastructure deployment finished."
