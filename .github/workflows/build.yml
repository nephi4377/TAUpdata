# v1.18.8 - 2026-03-06 終極發布架構 (修正路徑與完整打包)
name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: 

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-node-v20-${{ hashFiles('client/package-lock.json') }}

      - name: Install Dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          cd client
          npm install

      - name: Build and Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_SKIP_SIGN: true
        run: |
          # 進入客戶端目錄
          cd client
          
          # 取得版本號
          $VERSION = node -p "require('./package.json').version"
          echo "Preparing Release for v$VERSION"
          
          # [核心步驟 1] 執行全量打包 - 這是產出 .exe 的關鍵，絕不能遺漏
          echo "Running Full Build..."
          npm run build:win
          
          # [核心步驟 2] 製作業務補丁 (Patch)
          echo "Generating Patch Zip..."
          Compress-Archive -Path src -DestinationPath patch-v${VERSION}.zip -Force
          
          # [核心步驟 3] 建立 Release
          echo "Creating GitHub Release..."
          gh release create v$VERSION --title "Release v$VERSION" --generate-notes --repo nephi4377/TAUpdata 2>$null
          
          # [核心步驟 4] 上傳資產 (明確路徑)
          echo "Uploading Assets to Release..."
          
          # 1. 上傳 EXE
          $EXE_PATH = Get-ChildItem -Path "dist\*.exe" | Select-Object -ExpandProperty FullName
          if ($EXE_PATH) {
              echo "Uploading Installer: $EXE_PATH"
              gh release upload v$VERSION "$EXE_PATH" --clobber --repo nephi4377/TAUpdata
          } else {
              echo "ERROR: No .exe file found in client/dist/"
              exit 1
          }
          
          # 2. 上傳 latest.yml (用於自動更新檢測)
          if (Test-Path "dist\latest.yml") {
              gh release upload v$VERSION "dist\latest.yml" --clobber --repo nephi4377/TAUpdata
          }
          
          # 3. 上傳 Patch Zip
          if (Test-Path "patch-v${VERSION}.zip") {
              echo "Uploading Patch: patch-v${VERSION}.zip"
              gh release upload v$VERSION "patch-v${VERSION}.zip" --clobber --repo nephi4377/TAUpdata
          }
          
          # 5. 正式標記為 Latest
          gh release edit v$VERSION --draft=false --latest=true --repo nephi4377/TAUpdata
          echo "Success: v$VERSION Release Complete."
