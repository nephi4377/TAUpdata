# v1.6.0 - 2026-02-22 发布
name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*' # 當推送 v1.0.0 等版本標籤時觸發

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create and Upload Patch Zip
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd client
          $VERSION = node -p "require('./package.json').version"
          echo "Packaging version $VERSION"
          # 打包 src 資料夾作為熱更新補丁
          Compress-Archive -Path src -DestinationPath patch-v${VERSION}.zip -Force
          # 上傳到對應的 Release
          gh release upload v$VERSION patch-v${VERSION}.zip --clobber
          # 將此 Release 設為正式發佈 (取代 Draft)
          gh release edit v$VERSION --draft=false --latest=true
